#:schema: https://www.schemastore.org/prek.json
# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
default_language_version.python = "3.10"
exclude.glob = [".devcontainer/**", ".vscode/**"]
[[repos]]
repo = "builtin"
hooks = [
  { id = "check-added-large-files", args = [
    "--maxkb=1000",
  ] },
  { id = "check-case-conflict" },
  { id = "check-executables-have-shebangs" },
  { id = "check-json" },
  { id = "check-json5" },
  { id = "check-merge-conflict" },
  { id = "check-symlinks" },
  { id = "check-toml" },
  { id = "check-xml" },
  { id = "check-yaml" },
  { id = "detect-private-key" },
  { id = "end-of-file-fixer" },
  { id = "fix-byte-order-marker" },
  { id = "mixed-line-ending" },
  { id = "no-commit-to-branch" },
  { id = "trailing-whitespace" },
]
# [[repos]]
# repo = "https://github.com/crate-ci/typos"
# rev = "v1.47.1"
# hooks = [{ id = "typos" }]
[[repos]]
repo = "https://github.com/python-jsonschema/check-jsonschema"
rev = "0.37.4"
hooks = [
  { id = "check-dependabot" },
  { id = "check-github-actions" },
  { id = "check-github-issue-forms" },
  { id = "check-github-workflows" },
  { id = "check-renovate" },
]
[[repos]]
repo = "https://github.com/rhysd/actionlint"
rev = "v1.7.12"
hooks = [{ id = "actionlint" }]
[[repos]]
repo = "https://github.com/adrienverge/yamllint"
rev = "v1.38.0"
hooks = [{ id = "yamllint", args = ["-c", ".config/yamllint.yaml"] }]
[[repos]]
repo = "https://github.com/google/yamlfmt"
rev = "v0.21.0"
hooks = [{ id = "yamlfmt", args = ["-conf", ".config/yamlfmt.yml"] }]
# [[repos]]
# repo = "https://github.com/ComPWA/taplo-pre-commit"
# rev = "v0.9.3"
# hooks = [{ id = "taplo-lint" }, { id = "taplo-format" }]
[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "0.11.30"
hooks = [{ id = "uv-lock" }]
[[repos]]
repo = "https://github.com/abravalheri/validate-pyproject"
rev = "v0.25"
hooks = [{ id = "validate-pyproject" }]
[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.22"
hooks = [{ id = "ruff-check" }, { id = "ruff-format" }]
[[repos]]
repo = "https://github.com/jendrikseipp/vulture"
rev = "v2.16"
hooks = [{ id = "vulture" }]
[[repos]]
repo = "https://github.com/DetachHead/basedpyright-prek-mirror"
rev = "1.39.9"
hooks = [{ id = "basedpyright", files = "^((src|tests)/.*\\.py)$" }]
[[repos]]
repo = "https://github.com/facebook/pyrefly-pre-commit"
rev = "1.1.1"
hooks = [
  { id = "pyrefly-check", pass_filenames = false, files = "^((src|tests)/.*\\.py)$" },
]
[[repos]]
repo = "https://github.com/PyCQA/bandit"
rev = "1.9.4"
hooks = [
  { id = "bandit", additional_dependencies = [
    "bandit[toml]",
  ], args = [
    "-c",
    "pyproject.toml",
    "-r",
    "./src",
    "./tests",
  ] },
]
[[repos]]
repo = "https://github.com/ariebovenberg/slotscheck"
rev = "v0.20.1"
hooks = [
  { id = "slotscheck", args = [
    "--no-strict-imports",
  ], files = "^((src|tests)/.*\\.py)$" },
]
[[repos]]
repo = "https://github.com/pypa/pip-audit"
rev = "v2.10.1"
hooks = [{ id = "pip-audit", args = ["--disable-pip"], stages = ["pre-push"] }]
# [[repos]]
# repo = "https://github.com/dotenv-linter/dotenv-linter"
# rev = "v4.0.0"
# hooks = [{ id = "dotenv-linter" }]
[[repos]]
repo = "https://github.com/asottile/pyupgrade"
rev = "v3.21.2"
hooks = [{ id = "pyupgrade", args = ["--py310-plus"] }]
[[repos]]
repo = "local"
hooks = [
  { id = "local-mypy", name = "local-mypy", language = "system", entry = "uv run mypy", require_serial = true, types = [
    "python",
  ], exclude_types = [
    "symlink",
  ], files = "^((src|tests)/.*\\.py)$" },
  { id = "local-ty", name = "local-ty", language = "system", entry = "uv run ty check", require_serial = true, pass_filenames = false, types = [
    "python",
  ], files = "^((src|tests)/.*\\.py)$" },
  { id = "local-creosote", name = "local-creosote", language = "system", entry = "uv run creosote --deps-file pyproject.toml --section project.dependencies", pass_filenames = false, files = "^(pyproject\\.toml|uv\\.lock)$" },
  { id = "local-deptry", name = "local-deptry", language = "system", entry = "uv run deptry .", pass_filenames = false, files = "^pyproject\\.toml$" },
  { id = "local-lint-imports", name = "local-lint-imports", language = "system", entry = "uv run lint-imports", pass_filenames = false, require_serial = true, types = [
    "python",
  ], files = "^((src)/.*\\.py)$" },
]
